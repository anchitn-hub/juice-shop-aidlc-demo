name: Vercel Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Select Vercel environment
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "VERCEL_ENVIRONMENT=production" >> "$GITHUB_ENV"
            echo "VERCEL_PROD_FLAG=--prod" >> "$GITHUB_ENV"
          else
            echo "VERCEL_ENVIRONMENT=preview" >> "$GITHUB_ENV"
            echo "VERCEL_PROD_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment="$VERCEL_ENVIRONMENT" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        run: vercel build $VERCEL_PROD_FLAG --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel output
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt $VERCEL_PROD_FLAG --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel preview deployment: ${{ steps.deploy.outputs.url }}`
            })
