name: Codex PR Review Pack

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review_pack:
    runs-on: ubuntu-latest
    env:
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      PR_URL: ${{ github.event.pull_request.html_url || format('https://github.com/{0}/pull/{1}', github.repository, inputs.pr_number) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/merge
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Run review checks
        run: |
          npm run lint
          npm run test:frontend
          npm run test:server

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Resolve Jira issue from pull request
        id: jira_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF=$(gh pr view "$PR_URL" --json headRefName --jq .headRefName)
          ISSUE_KEY="${HEAD_REF#codex/}"
          echo "issue_key=$ISSUE_KEY" >> "$GITHUB_OUTPUT"

      - name: Comment review start in Jira
        run: |
          node scripts/jira.mjs comment "${{ steps.jira_issue.outputs.issue_key }}" "Codex PR review started for PR #${PR_NUMBER}. This workflow will not merge; human approval is required."

      - name: Codex generate PR review pack
        id: codex_review
        uses: openai/codex-action@v1
        with:
          allow-bots: true
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review-pack.md
          output-file: artifacts/codex-review-pack.md

      - name: Post Codex review pack
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const body = process.env.CODEX_FINAL_MESSAGE || "Codex review pack completed with no final message.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `${body}\n\n---\nManual merge required: this workflow intentionally does not merge PRs.`,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex_review.outputs.final-message }}

      - name: Comment manual review required in Jira
        run: |
          node scripts/jira.mjs comment "${{ steps.jira_issue.outputs.issue_key }}" "Codex review pack posted on PR #${PR_NUMBER}. Manual reviewer approval and merge are required."
