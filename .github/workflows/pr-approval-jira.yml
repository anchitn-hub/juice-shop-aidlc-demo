name: PR Approval Jira Update

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  update_jira:
    if: github.event.review.state == 'approved' && startsWith(github.event.pull_request.head.ref, 'codex/')
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      REVIEWER: ${{ github.event.review.user.login }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Extract Jira issue key
        id: issue
        run: |
          ISSUE_KEY="${HEAD_REF#codex/}"
          echo "issue_key=$ISSUE_KEY" >> "$GITHUB_OUTPUT"

      - name: Mark Jira approved
        run: node scripts/jira.mjs transition "${{ steps.issue.outputs.issue_key }}" "Approved" || true

      - name: Comment approval in Jira
        run: |
          node scripts/jira.mjs comment "${{ steps.issue.outputs.issue_key }}" "PR approved by ${REVIEWER}: ${PR_URL}. Manual merge to main is now allowed by the golden AIDLC pipeline."
